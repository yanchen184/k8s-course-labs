# Lab 6-1: 基本 Ingress（Path-based Routing）
# 功能：根據 URL 路徑，將流量導向不同的 Service
#   /frontend  → frontend-svc
#   /api       → api-svc
#
# 前置條件：
#   1. 已安裝 Ingress Controller（k3s 內建 Traefik）
#   2. kubectl get pods -n kube-system | grep traefik  → Running
#
# Docker 對照：這就像 Nginx 反向代理的 location block
#   location /frontend { proxy_pass http://frontend:80; }
#   location /api      { proxy_pass http://api:80; }
#
# 驗證：
#   curl http://<NODE-IP>/frontend → 印出 Server IP + Message: Hello from frontend
#   curl http://<NODE-IP>/api      → 印出 Server IP + Message: Hello from api
#   兩個 Server IP 不同 → 確認是不同 Pod 在服務

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deploy
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: app
          image: yanchen184/k8s-demo-app:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: MESSAGE
              value: "Hello from frontend"
            - name: USERNAME
              value: "guest"
            - name: PASSWORD
              value: "（未設定）"
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deploy
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: app
          image: yanchen184/k8s-demo-app:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: MESSAGE
              value: "Hello from api"
            - name: USERNAME
              value: "guest"
            - name: PASSWORD
              value: "（未設定）"
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: api-svc
spec:
  selector:
    app: api
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
spec:
  ingressClassName: traefik    # k3s 用 traefik；nginx-ingress 改成 nginx
  rules:
    - http:
        paths:
          - path: /frontend
            pathType: Prefix
            backend:
              service:
                name: frontend-svc
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-svc
                port:
                  number: 80
          - path: /config
            pathType: Prefix
            backend:
              service:
                name: frontend-svc
                port:
                  number: 80
