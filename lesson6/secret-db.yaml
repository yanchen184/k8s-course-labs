# Lab 6-5/6-6: ConfigMap + Secret 整合示範
# 功能：同時展示兩種注入行為
#   /frontend → env 注入（envFrom），改了要 rollout restart 才生效
#   /config   → Volume 掛載，改了等 30-60s kubelet 同步後直接生效
#
# Docker 對照：
#   docker run -e PASSWORD=mypassword yanchen184/k8s-demo-app
#   ↓ K8s 等價 ↓
#   用 ConfigMap + Secret 分開管理，再注入到 Pod
#
# ⚠ 重要觀念：Secret 的 Base64 編碼「不是加密」！
#   echo -n "mypassword" | base64  → bXlwYXNzd29yZA==
#   任何人拿到都能解碼，Secret 只是「不讓你一眼看到明文」
#
# 驗證：
#   curl http://<NODE-IP>/frontend
#   → Message: Hello K8s  ← 來自 ConfigMap（env 注入）
#   → Username: admin     ← 來自 ConfigMap（env 注入）
#   → Password: mypassword ← 來自 Secret（env 注入）
#
#   curl http://<NODE-IP>/config
#   → APP_MODE=production   ← 來自 ConfigMap（Volume 掛載）
#   → FEATURE_FLAG=false

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  MESSAGE: "Hello K8s"
  USERNAME: "admin"
  config.txt: |
    APP_MODE=production
    FEATURE_FLAG=false

---
# 方法 1：stringData（推薦，直接寫明文，K8s 自動 Base64）
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
type: Opaque
stringData:
  PASSWORD: "mypassword"

# 方法 2：data（手動 Base64）
# apiVersion: v1
# kind: Secret
# metadata:
#   name: app-secret
# type: Opaque
# data:
#   PASSWORD: bXlwYXNzd29yZA==   # echo -n "mypassword" | base64

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deploy
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: app
          image: yanchen184/k8s-demo-app:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: app-config    # ConfigMap：MESSAGE, USERNAME
            - secretRef:
                name: app-secret    # Secret：PASSWORD
          volumeMounts:
            - name: app-cfg
              mountPath: /etc/app   # config.txt 掛到這裡
          ports:
            - containerPort: 80
      volumes:
        - name: app-cfg
          configMap:
            name: app-config
            items:
              - key: config.txt
                path: config.txt

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
