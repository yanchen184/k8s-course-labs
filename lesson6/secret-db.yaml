# Lab 6-5/6-6: ConfigMap + Secret 整合示範
# 同時展示兩種行為：
#   /frontend → env 注入（envFrom），改了要 rollout restart 才生效
#   /config   → Volume 掛載，改了等 30-60s kubelet 同步後生效

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  MESSAGE: "Hello K8s"
  USERNAME: "admin"
  config.txt: |
    APP_MODE=production
    FEATURE_FLAG=false

---
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
type: Opaque
stringData:
  PASSWORD: "mypassword"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deploy
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: app
          image: yanchen184/k8s-demo-app:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret
          volumeMounts:
            - name: app-cfg
              mountPath: /etc/app
          ports:
            - containerPort: 80
      volumes:
        - name: app-cfg
          configMap:
            name: app-config
            items:
              - key: config.txt
                path: config.txt

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
