# 6-9 Step 5：Demo App 前端 Deployment + ClusterIP Service
# 用途：整合示範用前端，從 ConfigMap 注入 MESSAGE/USERNAME 環境變數
# 注意：使用 k8s-demo-app，curl /frontend 顯示 Message / Username

apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deploy
  namespace: my-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: app
          image: yanchen184/k8s-demo-app:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: app-config    # MESSAGE, USERNAME 從 ConfigMap 注入
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
  namespace: my-app
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
