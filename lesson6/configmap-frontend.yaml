# 6-9 Step 3：前端 Nginx 首頁內容 ConfigMap
# 用途：把 HTML 內容存在 ConfigMap，掛載到 Nginx 的 index.html
# 注意：value 是整個 HTML 檔案，用 | 表示多行字串

apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: my-app
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <body>
      <h1>My App Frontend</h1>
      <p>Welcome!</p>
    </body>
    </html>
