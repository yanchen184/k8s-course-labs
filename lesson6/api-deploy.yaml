# 6-9 Step 6：Demo App API Deployment + ClusterIP Service
# 用途：整合示範用 API，curl /api 顯示 Message: Hello from api

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deploy
  namespace: my-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: app
          image: yanchen184/k8s-demo-app:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: MESSAGE
              value: "Hello from api"
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: api-svc
  namespace: my-app
spec:
  selector:
    app: api
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
