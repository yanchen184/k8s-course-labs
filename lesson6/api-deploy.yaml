# 6-9 Step 6：httpd API Deployment + ClusterIP Service
# 用途：整合示範用 API，簡單的 httpd 作為 /api 後端

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deploy
  namespace: my-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: httpd
          image: httpd:2.4
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: api-svc
  namespace: my-app
spec:
  selector:
    app: api
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
