# Loop 5 必做題目解答：Redis StatefulSet
# 場景：每個 Pod 有固定名稱、有序啟動、各自獨立的 500Mi 儲存
# 驗證：
#   kubectl get pods → 看到 redis-0 和 redis-1
#   kubectl get pvc  → 看到兩個獨立 PVC（redis-data-redis-0, redis-data-redis-1）
#   刪 redis-0 後，Pod 名稱重建後不變

---
# Headless Service（StatefulSet 必須搭配）
apiVersion: v1
kind: Service
metadata:
  name: redis-headless
spec:
  clusterIP: None
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
# StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
spec:
  serviceName: redis-headless
  replicas: 2
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 500Mi
