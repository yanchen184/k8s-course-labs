# Loop 4 必做題目：故障診斷解答
# 修正說明：
#   錯誤一：ReadWriteMany → ReadWriteOnce（hostPath 只支援 RWO）
#   錯誤二+三：storageClassName 統一改成 manual（PV 和 PVC 要一致）
#   額外：PVC storage 從 2Gi 改成 1Gi（不能超過 PV 的容量）

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pg-pv
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce        # 修正：hostPath 用 RWO
  storageClassName: manual # 修正：和 PVC 統一
  hostPath:
    path: /data/pg
    type: DirectoryOrCreate
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pg-pvc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: manual # 修正：和 PV 統一
  resources:
    requests:
      storage: 1Gi         # 修正：不超過 PV 容量
---
# 搭配的 PostgreSQL Deployment（自己完成）
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pg-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          env:
            - name: POSTGRES_PASSWORD
              value: "mypassword"
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: pg-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: pg-storage
          persistentVolumeClaim:
            claimName: pg-pvc
