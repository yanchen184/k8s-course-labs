# Lab 6-3: ConfigMap（從 literal 建立 + 環境變數注入）
# 功能：把應用的設定抽出來，不要寫死在 Image 裡
#
# Docker 對照：
#   docker run -e USERNAME=admin -e MESSAGE=HelloWorld yanchen184/k8s-demo-app
#   ↓ K8s 等價 ↓
#   用 ConfigMap 集中管理，再注入到 Pod
#
# 驗證（curl 直接看到 ConfigMap 的值）：
#   curl http://<NODE-IP>/frontend
#   → Server: 10.42.x.x:80
#   → Message: Hello from ConfigMap
#   → Username: admin           ← 來自 ConfigMap
#   → Password: （未設定）

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  MESSAGE: "Hello from ConfigMap"
  USERNAME: "admin"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deploy
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: app
          image: yanchen184/k8s-demo-app:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: app-config    # 把 ConfigMap 所有 key 注入為環境變數
          env:
            - name: PASSWORD
              value: "（未設定）"   # Secret 那張才會真正注入
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
