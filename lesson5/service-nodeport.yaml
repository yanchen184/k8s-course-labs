# ============================================
# NodePort Service — 外部存取
# 用途：Loop 6 NodePort 實作
# ============================================
apiVersion: v1
kind: Service
metadata:
  name: nginx-nodeport
spec:
  type: NodePort
  selector:
    app: nginx
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
      protocol: TCP
