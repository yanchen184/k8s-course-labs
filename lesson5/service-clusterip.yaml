# ============================================
# ClusterIP Service — 叢集內部存取
# 用途：Loop 5 ClusterIP 實作
# ============================================
apiVersion: v1
kind: Service
metadata:
  name: nginx-svc
spec:
  type: ClusterIP
  selector:
    app: nginx
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
